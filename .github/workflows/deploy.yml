name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the minimum permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments; cancel in-progress runs for the same branch
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install pnpm before setup-node so the cache key is resolved correctly
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # public/.nojekyll is already copied into dist/ by Vite during the build
      # (Vite copies everything in public/ verbatim). This step is a safety net
      # in case the file is somehow absent.
      - name: Ensure .nojekyll is present in dist
        run: touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire dist/ directory produced by `pnpm build`
          path: dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
