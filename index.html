<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STACKD</title>
    <!-- SPA routing on GitHub Pages: restore the original path that was
         encoded into ?p=... by public/404.html after a hard-reload or
         direct-URL navigation. -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          // Replace the ?p=... entry so the browser history stays clean.
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
